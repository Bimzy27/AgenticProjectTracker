appId: com.branden.agentic-project-tracker
productName: Agentic Project Tracker
directories:
  output: dist
files:
  - out/**
  - package.json
# The Agent SDK spawns its native claude binary as a child process; executables
# inside app.asar cannot be spawned, so ship the platform package unpacked.
asarUnpack:
  - node_modules/@anthropic-ai/claude-agent-sdk-*/**
win:
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: Agentic Project Tracker
  artifactName: AgenticProjectTracker-Setup-${version}.${ext}
npmRebuild: false
